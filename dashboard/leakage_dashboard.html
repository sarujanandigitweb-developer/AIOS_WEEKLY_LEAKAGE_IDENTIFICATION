<!DOCTYPE html>
<!--
  WLSP Dashboard — index.html  (DISPLAY ONLY · executive UI)
  AIOS Weekly Leakage Identification · UK Amazon FBM · LEDSone + DCVoltage

  Reads EXCLUSIVELY from window.dashboardData (data.js).
  NO database / MCP / SQL / calculations / hardcoded leakage values.
  This refactor changes PRESENTATION ONLY — counts, filtering, L1-L5 logic,
  and the dashboardData schema are unchanged.
-->
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WLSP · Weekly Leakage Dashboard</title>
<style>
  /* ---------- Theme tokens (default dark; light overrides below) ---------- */
  :root{
    --bg:#0b1019; --bg2:#121a28; --card:#161f2e; --card2:#1d2738; --line:#2b3650;
    --text:#eaf0f8; --muted:#8b96aa; --soft:#aeb9cb;
    --red:#f0535a; --redb:#3a1f25; --grn:#3fb950; --grnb:#16301f;
    --amber:#e3b341; --amberb:#3a3018; --blue:#4f9cf9; --blueb:#16263f;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 20px -6px rgba(0,0,0,.45);
    --shadow-sm:0 1px 2px rgba(0,0,0,.35);
    --shadow-lg:0 18px 44px -14px rgba(0,0,0,.6),0 3px 10px rgba(0,0,0,.3);
    --ring:0 0 0 3px rgba(79,156,249,.32);
    --radius:12px;
  }
  html[data-theme="light"]{
    --bg:#eef1f6; --bg2:#eaeef4; --card:#ffffff; --card2:#f6f8fc; --line:#dde3ec;
    --text:#161d2b; --muted:#535e70; --soft:#525b69;
    --redb:#fdecec; --grnb:#e9f7ee; --amberb:#fdf3da; --blueb:#e9f1fe;
    --shadow:0 1px 2px rgba(20,30,50,.07),0 6px 18px -6px rgba(20,30,50,.10);
    --shadow-sm:0 1px 2px rgba(20,30,50,.06);
    --shadow-lg:0 20px 44px -16px rgba(20,30,50,.20),0 3px 10px rgba(20,30,50,.08);
    --ring:0 0 0 3px rgba(79,156,249,.24);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:13.5px;line-height:1.45;
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:.1px;}
  .wrap{max-width:1880px;margin:0 auto;padding:0 32px 28px;}
  a{color:var(--blue);text-decoration:none;}
  .mono{font-family:"SF Mono",Consolas,Menlo,monospace;}

  /* ---------- Top bar (distinct header band) ---------- */
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;
    margin:0 -32px 22px;padding:21px 32px;
    background:linear-gradient(135deg,#070e33 0%,#16266b 50%,#070e33 100%);
    border:0;border-bottom:1px solid rgba(255,255,255,.12);border-radius:0;
    box-shadow:var(--shadow-lg);position:sticky;top:0;z-index:50;}
  .topbar::after{content:"";position:absolute;left:0;right:0;bottom:-13px;height:1px;
    background:linear-gradient(90deg,transparent,rgba(79,156,249,.5),transparent);}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .dot{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--red),var(--amber));
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;box-shadow:var(--shadow);}
  .brand h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.3px;color:#ffffff;}
  .brand .sub{font-size:11px;color:rgba(255,255,255,.66);text-transform:uppercase;letter-spacing:.7px;}
  .header-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
  .hbtn{display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;
    background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:7px 12px;
    box-shadow:var(--shadow-sm);transition:transform .12s ease,border-color .15s ease,box-shadow .15s ease,background .15s ease;}
  .hbtn .hi{font-size:13px;line-height:1;}
  .hbtn:hover{transform:translateY(-1px);border-color:var(--blue);box-shadow:var(--shadow);background:var(--card2);}
  .hbtn:active{transform:translateY(0);box-shadow:var(--shadow-sm);}
  .hbtn:focus-visible{outline:none;box-shadow:var(--ring);}
  .theme-btn{background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:10px;
    padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow-sm);
    transition:transform .12s ease,border-color .15s ease,box-shadow .15s ease,background .15s ease;}
  .theme-btn:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:var(--shadow);background:var(--card2);}
  .theme-btn:active{transform:translateY(0);}
  .theme-btn:focus-visible{outline:none;box-shadow:var(--ring);}
  /* header controls sit on the dark navy band — glassy white treatment in both themes */
  .topbar .hbtn,.topbar .theme-btn{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18);color:#ffffff;box-shadow:none;}
  .topbar .hbtn:hover,.topbar .theme-btn:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.34);transform:translateY(-1px);box-shadow:0 6px 16px -6px rgba(0,0,0,.55);}
  .topbar .hbtn:active,.topbar .theme-btn:active{transform:translateY(0);}
  .topbar .hbtn:focus-visible,.topbar .theme-btn:focus-visible{box-shadow:var(--ring);}

  /* ---------- Executive stat cards ---------- */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:7px 12px;box-shadow:var(--shadow);}
  .stat .k{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .stat .v{font-size:16px;font-weight:750;margin-top:1px;line-height:1.2;}
  .stat .v.sm{font-size:12.5px;font-weight:650;}
  .stat-refresh{cursor:pointer;font-family:inherit;text-align:left;display:flex;flex-direction:column;justify-content:center;
    border-style:dashed;color:var(--text);transition:transform .14s ease,box-shadow .16s ease,border-color .14s ease,background .15s ease;}
  .stat-refresh .rfx{display:flex;align-items:center;gap:7px;color:var(--blue);}
  .stat-refresh .rfx-ic{font-size:15px;display:inline-block;}
  .stat-refresh:hover{border-style:solid;border-color:var(--blue);background:var(--card2);transform:translateY(-2px);box-shadow:var(--shadow-lg);}
  .stat-refresh:hover .rfx-ic{animation:wlsp-spin .6s linear;}
  .stat-refresh:active{transform:translateY(0);}
  .stat-refresh:focus-visible{outline:none;box-shadow:var(--ring);}
  @keyframes wlsp-spin{to{transform:rotate(360deg);}}

  /* ---------- KPI cards (act as analysis tabs) ---------- */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-bottom:16px;}
  @media(min-width:1300px){.kpis{grid-template-columns:repeat(5,minmax(0,1fr));}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:9px 13px 8px;cursor:pointer;
    position:relative;overflow:hidden;box-shadow:var(--shadow);transition:transform .08s,border-color .12s;}
  .kpi:hover{transform:translateY(-2px);}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent,var(--muted));}
  .kpi.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),var(--shadow);}
  .kpi .kpi-head{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .kpi .name{font-size:17px;font-weight:800;letter-spacing:.2px;flex:1;min-width:0;line-height:1.2;}
  .kpi .count{font-size:17px;font-weight:800;line-height:1;flex:none;color:var(--accent,var(--text));
    background:rgba(79,156,249,.14);
    border:1px solid rgba(79,156,249,.38);border-radius:20px;padding:4px 12px;}
  .kpi .kpi-sub{display:flex;align-items:center;gap:7px;margin-top:7px;}
  .kpi .lvl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:20px;flex:none;}
  .kpi .desc{font-size:10.5px;color:var(--muted);line-height:1.3;}
  /* clickable affordance — makes it obvious the card opens its details */
  .kpi .kpi-cta{display:flex;align-items:center;justify-content:space-between;gap:6px;
    margin-top:6px;padding-top:6px;border-top:1px dashed var(--line);}
  .kpi .kpi-view{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--accent,var(--blue));}
  .kpi .kpi-view.on{color:var(--grn);}
  .kpi .kpi-arrow{font-size:13px;font-weight:800;line-height:1;color:var(--accent,var(--blue));transition:transform .15s ease;}
  .kpi:hover .kpi-arrow{transform:translateX(4px);}
  .kpi:focus-visible{outline:none;box-shadow:var(--ring);}

  /* ---------- Tab bar (explicit selector synced with the KPI cards) ---------- */
  .tabbar-wrap{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .tabbar-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);flex:none;}
  .tabbar{display:flex;gap:6px;flex:1;min-width:0;overflow-x:auto;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:6px;}
  .tab{display:inline-flex;align-items:center;gap:8px;flex:none;padding:9px 14px;border-radius:8px;cursor:pointer;
    font-family:inherit;font-size:12.5px;font-weight:700;color:var(--muted);white-space:nowrap;background:none;
    border:1px solid transparent;transition:background .14s ease,color .14s ease,border-color .14s ease,box-shadow .14s ease;}
  .tab:hover{background:var(--bg2);color:var(--text);}
  .tab.active{color:var(--text);background:rgba(79,156,249,.12);
    border-color:var(--accent);box-shadow:inset 0 -2px 0 var(--accent);}
  .tab:focus-visible{outline:none;box-shadow:var(--ring);}
  .tab .tab-ct{font-size:10.5px;font-weight:800;color:var(--accent,var(--muted));
    background:rgba(79,156,249,.14);padding:1px 8px;border-radius:20px;}
  @media(max-width:760px){.tabbar-wrap{flex-direction:column;align-items:stretch;gap:6px;} .tabbar-label{padding-left:2px;}}
  .lvl.crit{background:var(--redb);color:var(--red);} .lvl.high{background:var(--amberb);color:var(--amber);}
  .lvl.med{background:var(--blueb);color:var(--blue);} .lvl.low{background:var(--grnb);color:var(--grn);}

  /* ---------- Overview grid ---------- */
  .overview{display:grid;grid-template-columns:1.4fr 1fr 1.3fr;gap:14px;margin-bottom:16px;}
  @media(max-width:1080px){.overview{grid-template-columns:1fr;}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .panel h3{margin:0;padding:12px 15px;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);border-bottom:1px solid var(--line);}
  .panel .body{padding:8px 10px;max-height:320px;overflow:auto;}
  /* PH overview table */
  table.ovt{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.ovt td{padding:7px 8px;border-bottom:1px solid var(--line);}
  table.ovt tr{cursor:pointer;} table.ovt tr:hover td{background:var(--card2);}
  table.ovt tr.sel td{background:var(--blueb);}
  table.ovt .nm{font-weight:600;} table.ovt .ct{text-align:right;font-weight:700;}
  .badge{display:inline-block;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 8px;border-radius:20px;}
  .badge.crit{background:var(--redb);color:var(--red);} .badge.high{background:var(--amberb);color:var(--amber);}
  .badge.med{background:var(--blueb);color:var(--blue);} .badge.low{background:var(--grnb);color:var(--grn);}
  /* account overview */
  .acct-row{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;border-bottom:1px solid var(--line);}
  .acct-row:last-child{border-bottom:0;}
  .acct-row .an{font-weight:650;} .acct-row .ac{font-size:20px;font-weight:800;}
  .acct-row .led{color:var(--blue);} .acct-row .dcv{color:var(--red);}
  /* verification status cards */
  .vstatus{display:grid;grid-template-columns:1fr;gap:8px;padding:10px;}
  .vcard{display:flex;gap:10px;align-items:flex-start;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--card2);}
  .vcard .ic{font-size:15px;line-height:1.1;} .vcard.ok .ic{color:var(--grn);} .vcard.warn .ic{color:var(--amber);}
  .vcard .vt{font-weight:650;font-size:12.5px;} .vcard .vd{font-size:11px;color:var(--muted);margin-top:1px;}

  /* ---------- Main shell: account rail (top-left) + main column ---------- */
  .shell{display:grid;grid-template-columns:270px minmax(0,1fr);gap:16px;align-items:start;margin-bottom:18px;}
  @media(max-width:900px){.shell{grid-template-columns:1fr;}}
  .main{min-width:0;}
  /* top-left account selector sidebar */
  /* sidebar = two clearly separate section cards with a gap between them */
  .accounts-rail{position:sticky;top:94px;display:flex;flex-direction:column;gap:14px;
    background:none;border:0;border-radius:0;box-shadow:none;overflow:visible;}
  .rail-sec{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .rail-sec .rail-h{margin:0;padding:11px 14px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;
    display:flex;align-items:center;gap:9px;}
  .rail-sec .rail-h::before{content:"";width:9px;height:9px;border-radius:50%;flex:none;}
  /* Accounts — solid dark navy header */
  .sec-acct{border-top:3px solid var(--blue);}
  .sec-acct .rail-h{color:#ffffff;background:linear-gradient(135deg,#16266b,#070e33);border-bottom:1px solid rgba(255,255,255,.14);}
  .sec-acct .rail-h::before{background:var(--blue);box-shadow:0 0 0 3px rgba(79,156,249,.35);}
  /* Portfolio Holders — light header with amber accent (visibly different treatment) */
  .sec-ph{border-top:3px solid var(--amber);}
  .sec-ph .rail-h{color:var(--text);background:var(--card2);border-left:4px solid var(--amber);
    border-bottom:2px solid var(--amber);padding-left:11px;}
  .sec-ph .rail-h::before{background:var(--amber);box-shadow:0 0 0 3px rgba(227,179,65,.30);}
  .acct-opt{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;text-align:left;
    background:none;border:0;border-bottom:1px solid var(--line);color:var(--text);
    padding:11px 14px;cursor:pointer;font-family:inherit;font-size:12.5px;}
  .acct-opt:last-child{border-bottom:0;}
  .acct-opt:hover:not(.on){background:var(--bg2);}
  .acct-opt.on{background:linear-gradient(135deg,#3b62d6,#4f9cf9);box-shadow:inset 0 0 0 1px rgba(255,255,255,.16),var(--shadow-sm);}
  .acct-opt.on .ao-name{color:#fff;font-weight:750;}
  .acct-opt.on .ao-ct,.acct-opt.on .ao-ct.led,.acct-opt.on .ao-ct.dcv,.acct-opt.on .ao-ct.oth{color:#fff;}
  .acct-opt .ao-name{font-weight:650;}
  .acct-opt .ao-ct{font-weight:800;font-size:13px;}
  .acct-opt .ao-ct.led{color:var(--blue);} .acct-opt .ao-ct.dcv{color:var(--red);} .acct-opt .ao-ct.oth{color:var(--muted);}
  .ph-opt{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;text-align:left;
    background:none;border:0;border-bottom:1px solid var(--line);color:var(--text);
    padding:8px 14px;cursor:pointer;font-family:inherit;font-size:12px;}
  .ph-opt:last-child{border-bottom:0;}
  .ph-opt:hover:not(.on){background:var(--bg2);}
  .ph-opt.on{background:linear-gradient(135deg,#3b62d6,#4f9cf9);box-shadow:inset 0 0 0 1px rgba(255,255,255,.16),var(--shadow-sm);}
  .ph-opt.on .po-name{color:#fff;font-weight:750;}
  .ph-opt.on .po-ct{color:#fff;opacity:1;}
  .ph-opt .po-name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ph-opt .po-ct{font-weight:800;color:var(--muted);flex:none;}
  .ph-opt.empty-ph .po-name{color:var(--muted);font-weight:550;}
  .ph-opt .po-ct.zero{color:var(--soft);opacity:.55;font-weight:700;}
  @media(max-width:900px){.accounts-rail{position:static;}}

  /* ---------- Source Readiness footer ---------- */
  .readiness{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--blue);
    border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-top:6px;}
  .readiness h3{margin:0;padding:12px 16px;font-size:12px;text-transform:uppercase;letter-spacing:.6px;
    color:var(--muted);border-bottom:1px solid var(--line);}
  .readiness .vstatus{grid-template-columns:repeat(auto-fit,minmax(240px,1fr));}

  /* ---------- Detail section ---------- */
  .detail{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .dhead{padding:11px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--card2),var(--card));}
  .dhead .dh-title-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;}
  .dhead .dh-name{font-size:15px;font-weight:800;letter-spacing:.2px;}
  .dhead .dh-window{font-size:9.5px;font-weight:800;color:var(--muted);background:var(--bg2);border:1px solid var(--line);
    border-radius:20px;padding:2px 9px;text-transform:uppercase;letter-spacing:.5px;}
  .dhead .dh-concept{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.35;}
  .dhead .dh-concept b{color:var(--soft);font-weight:700;}
  .dhead-flag{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap;}
  .dhead-flag .df-k{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);flex:none;}
  .dhead-flag .df-v{font-family:Consolas,monospace;font-size:10.5px;color:var(--grn);background:var(--grnb);border-radius:6px;padding:3px 8px;}
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--line);background:var(--card2);}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:7px 11px;}
  .search input{flex:1;background:none;border:0;color:var(--text);font-size:13px;outline:none;}
  .chip{font-size:11.5px;border:1px solid var(--line);background:var(--bg2);color:var(--soft);border-radius:20px;padding:6px 12px;cursor:pointer;}
  .chip.on{background:var(--blue);color:#fff;border-color:var(--blue);}
  .clear{font-size:11.5px;border:1px solid var(--line);background:none;color:var(--red);border-radius:20px;padding:6px 12px;cursor:pointer;}
  .progress{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;margin-left:auto;}
  .bar{width:160px;height:7px;background:var(--line);border-radius:6px;overflow:hidden;}
  .bar>div{height:100%;background:var(--grn);width:0;transition:width .2s;}

  .grid-cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:14px 16px;}
  @media(max-width:860px){.grid-cards{grid-template-columns:minmax(0,1fr);}}
  .lcard{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:10px 14px 9px;position:relative;
    box-shadow:var(--shadow-sm);transition:opacity .15s;}
  .lcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:12px 0 0 12px;background:var(--accent,var(--muted));}
  .lcard.done{opacity:.55;}
  .lcard .top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .lcard .asin{font-weight:750;font-size:14px;font-family:Consolas,monospace;letter-spacing:.2px;}
  .lcard .acct{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}
  .acct.led{background:var(--blueb);color:var(--blue);} .acct.dcv{background:var(--redb);color:var(--red);}
  .acct.oth{background:var(--card);color:var(--muted);border:1px solid var(--line);}
  .lcard .sku{font-size:11px;color:var(--soft);font-weight:600;margin-top:3px;word-break:break-all;font-family:Consolas,monospace;}
  .lcard .ph{font-size:11.5px;margin-top:4px;color:var(--text);font-weight:550;}
  .lcard .ph b{color:var(--text);font-weight:750;}
  /* card badge row — priority / category / status */
  .cbadges{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
  .cpill{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:20px;
    border:1px solid var(--line);color:var(--soft);background:var(--bg2);line-height:1.4;}
  .cpill.cat{color:var(--blue);background:var(--blueb);border-color:transparent;}
  .cpill.st-open{color:var(--amber);background:var(--amberb);border-color:transparent;}
  .cpill.st-done{color:var(--grn);background:var(--grnb);border-color:transparent;}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;margin-top:8px;}
  .metric{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;border-bottom:1px solid var(--line);padding-bottom:3px;}
  .metric .ml{color:var(--soft);font-size:11px;font-weight:600;} .metric .mv{font-weight:750;}
  .mv.neg{color:var(--red);}
  .lcard .eq{font-family:Consolas,monospace;font-size:10.5px;color:var(--soft);font-weight:600;margin-top:6px;
    background:var(--bg2);border:1px solid var(--line);border-radius:7px;padding:4px 8px;word-break:break-word;}
  .lcard .foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:7px;border-top:1px solid var(--line);}
  .lcard .act{font-size:10px;font-weight:800;letter-spacing:.4px;color:var(--red);text-transform:uppercase;
    background:var(--redb);padding:3px 9px;border-radius:20px;}
  .tickwrap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);cursor:pointer;-webkit-user-select:none;user-select:none;}
  .acct-chips{display:flex;gap:7px;flex-wrap:wrap;}
  .flush{padding:0;}
  .tickwrap input{accent-color:var(--grn);}

  .ph-block{padding:4px 16px 2px;}
  .ph-banner{display:flex;justify-content:space-between;align-items:center;margin:14px 0 2px;padding:9px 13px;
    background:linear-gradient(135deg,#16266b,#070e33);border:1px solid rgba(255,255,255,.10);
    border-left:3px solid var(--blue);border-radius:9px;cursor:pointer;box-shadow:var(--shadow-sm);}
  .ph-banner .pn{font-weight:750;font-size:13px;color:#ffffff;} .ph-banner .pc{font-size:11.5px;color:#ffb4b8;font-weight:700;}

  table.mini{border-collapse:collapse;width:100%;margin:6px 0 2px;font-size:12px;}
  table.mini th,table.mini td{border:1px solid var(--line);padding:5px 8px;text-align:right;}
  table.mini th{background:var(--bg2);color:var(--muted);font-weight:600;}
  table.mini th:first-child,table.mini td:first-child{text-align:left;}
  table.mini tr.decline td{background:var(--redb);color:var(--red);font-weight:650;}
  .empty{color:var(--muted);padding:30px;text-align:center;font-style:italic;}
  .footnote{color:var(--muted);font-size:11px;padding:6px 16px 16px;}

  /* ===================== Professional polish layer ===================== */
  /* Stat cards — subtle lift */
  .stat{transition:transform .14s ease,box-shadow .16s ease,border-color .14s ease;}
  .stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--blue);}
  /* KPI tabs — stronger lift + growing accent rail */
  .kpi{transition:transform .14s ease,box-shadow .18s ease,border-color .15s ease,opacity .15s ease;}
  .kpi::before{transition:width .15s ease;}
  .kpi:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--accent);}
  .kpi:hover::before{width:6px;}
  .kpi:focus-visible{outline:none;box-shadow:var(--ring);}
  .kpi .count{letter-spacing:-.5px;}
  .kpi.active{background:var(--card) linear-gradient(180deg,rgba(79,156,249,.06),transparent);}
  /* selected card stays prominent; the others fade back (button-group feel) */
  .kpi{opacity:.5;}
  .kpi.active{opacity:1;}
  .kpi:hover,.kpi:focus-visible{opacity:1;}
  /* Sidebar options — accent cue on hover */
  .acct-opt,.ph-opt{transition:background .14s ease,box-shadow .14s ease,color .14s ease;}
  .acct-opt:hover:not(.on),.ph-opt:hover:not(.on){box-shadow:inset 3px 0 0 var(--blue);}
  /* Filter chips & clear */
  .chip{transition:transform .12s ease,background .14s ease,border-color .14s ease,color .14s ease;}
  .chip:hover{border-color:var(--blue);color:var(--text);transform:translateY(-1px);}
  .chip.on:hover{color:#fff;}
  .clear{transition:background .14s ease,border-color .14s ease,color .14s ease;}
  .clear:hover{background:var(--redb);border-color:var(--red);}
  .search{transition:border-color .15s ease,box-shadow .15s ease;}
  .search:focus-within{border-color:var(--blue);box-shadow:var(--ring);}
  /* Leakage cards — lift + accent border */
  .lcard{transition:transform .14s ease,box-shadow .16s ease,border-color .14s ease,opacity .15s ease;}
  .lcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--accent);}
  .lcard.done:hover{transform:none;box-shadow:none;}
  /* PH banners + verification cards */
  .ph-banner{transition:background .14s ease,border-color .14s ease,box-shadow .14s ease;}
  .ph-banner:hover{border-color:var(--blue);box-shadow:var(--shadow);background:linear-gradient(135deg,#1d3080,#0c1646);}
  .vcard{transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease;}
  .vcard:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm);border-color:var(--blue);}
  table.mini tr{transition:background .12s ease;}
  table.ovt tr{transition:background .12s ease;}
  /* Brand polish */
  .brand h1{letter-spacing:.1px;}
  .brand .dot{transition:transform .2s ease;}
  .topbar:hover .brand .dot{transform:rotate(-4deg) scale(1.04);}
  /* Custom scrollbars (WebKit/Blink — widely supported in Chromium, Edge & Safari) */
  *::-webkit-scrollbar{width:10px;height:10px;}
  *::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
  *::-webkit-scrollbar-thumb:hover{background:var(--muted);}
  *::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;border:2px solid transparent;background-clip:content-box;}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted);}

  /* ===================== Print ===================== */
  @media print{
    :root,html[data-theme="dark"],html[data-theme="light"]{
      --bg:#fff;--bg2:#fff;--card:#fff;--card2:#fff;--line:#cbd3df;
      --text:#000;--muted:#444;--soft:#333;
      --shadow:none;--shadow-sm:none;--shadow-lg:none;
    }
    body{background:#fff;}
    .header-actions,.toolbar .search,.clear,.progress,.stat-refresh{display:none!important;}
    .topbar,.accounts-rail{position:static!important;}
    .wrap{max-width:none;padding:0;}
    .shell{grid-template-columns:240px 1fr;}
    .grid-cards{grid-template-columns:1fr 1fr;}
    *{box-shadow:none!important;}
    .lcard,.kpi,.stat,.detail,.readiness,.accounts-rail,.ph-block{break-inside:avoid;}
    a{color:#000;}
  }
</style>

  const pct=(a,b)=>{a=Number(a);b=Number(b);return!b?'0.00%':(100*a/b).toFixed(2)+'%';};
  const esc=s=>txt(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const rowsFor=k=>Array.isArray(D[k])?D[k]:[];
  function uniquePhs(rows){return [...new Set(rows.map(r=>r.ph||'UNATTRIBUTED'))];}
  function acctMatch(r){return acctFilter==='__ALL__'||r.account===acctFilter;}
  function phMatch(r){return phFilter==='__ALL__'||(r.ph||'UNATTRIBUTED')===phFilter;}
  function viewMatch(r){return acctMatch(r)&&phMatch(r);}
  /* Counts are derived live from the leakage rows so every view reconciles:
     a row counts only when it matches BOTH the selected account and the selected PH.
     l5 (Margin Trend) carries no account, so it is counted on its own (unique
     declining PHs) and is EXCLUDED from the flagged totals — see totalFlagged(). */
  /* L5 carries an account dimension: account='ALL' is the combined cross-account trend
     (shown for "All accounts"); per-account rows show when a specific account is selected. */
  function l5Acct(){return acctFilter==='__ALL__'?'ALL':acctFilter;}
  function countFor(k){
    if(k==='l5')return uniquePhs(rowsFor('l5').filter(r=>(r.account||'ALL')===l5Acct()&&r.declining&&phMatch(r))).length;
    return rowsFor(k).filter(viewMatch).length;}
  function acctClass(a){a=txt(a).toLowerCase();return a.indexOf('dcv')>=0?'dcv':(a.indexOf('led')>=0?'led':'oth');}
  function rowKey(k,r){return k+'::'+txt(r.asin)+'::'+txt(r.sku)+'::'+txt(r.ph)+'::'+txt(r.month);}
  function loadTicks(){try{return JSON.parse(localStorage.getItem('wlsp_ticks')||'{}');}catch(e){return{};}}
  function saveTicks(){try{localStorage.setItem('wlsp_ticks',JSON.stringify(TICKS));}catch(e){}}

  /* ---- presentation-only risk badges (no business logic) ---- */
  function rowRisk(k,r){
    if(k==='l2')return Number(r.shipping_pct)>=100?'crit':Number(r.shipping_pct)>=50?'high':'med';
    if(k==='l3')return Number(r.net)<=-10?'crit':'high';
    if(k==='l4')return Number(r.refund_rate)>=33?'high':'med';
    if(k==='l1')return Number(r.spend)>=10?'high':'med';
    return 'high';
  }
  function phRisk(n){return n>=15?'crit':n>=6?'high':n>=3?'med':'low';}

  /* ---- aggregates derived live from the leakage rows ---- */
  /* Every flagged total is the sum of the 4 account-attributable leakages (l1..l4).
     Margin Trend (l5) has no account, so it is NEVER added into a flagged total —
     it would otherwise inflate "All accounts" above the sum of the per-account views.
     Counting from the rows guarantees: All == LEDSone + DCVoltage, and each PH total
     rolls up into its account total. */
  const FLAG_KEYS=['l1','l2','l3','l4'];
  function hasAcctSummary(){return Array.isArray(D.account_summary)&&D.account_summary.length;}
  function hasPhSummary(){return Array.isArray(D.ph_summary)&&D.ph_summary.length;}
  /* per-PH flag counts, filtered by the selected account */
  function phTotals(){
    const m={};
    FLAG_KEYS.forEach(k=>rowsFor(k).forEach(r=>{if(!acctMatch(r))return;const p=r.ph||'UNATTRIBUTED';m[p]=(m[p]||0)+1;}));
    return Object.keys(m).map(p=>({ph:p,count:m[p]})).sort((a,b)=>b.count-a.count);
  }
  /* per-account flag counts */
  function acctTotals(){
    const m={};
    FLAG_KEYS.forEach(k=>rowsFor(k).forEach(r=>{const a=r.account||'—';m[a]=(m[a]||0)+1;}));
    return m;
  }
  function allPhs(){
    const s=new Set();FLAG_KEYS.forEach(k=>rowsFor(k).forEach(r=>{if(acctMatch(r))s.add(r.ph||'UNATTRIBUTED');}));
    return [...s];}
  /* Affected PHs = distinct portfolio holders with >=1 flag (excludes UNATTRIBUTED).
     The l1/l2 detail arrays are capped (top-N), so for the unfiltered view we use the
     authoritative ph_summary; account-filtered views fall back to the rows available. */
  function affectedPhCount(){
    if(acctFilter==='__ALL__'&&hasPhSummary()){
      return D.ph_summary.filter(p=>p.ph&&p.ph!=='UNATTRIBUTED'&&Number(p.total||((p.l1||0)+(p.l2||0)+(p.l3||0)+(p.l4||0)+(p.l5||0)))>0).length;
    }
    const s=new Set();
    FLAG_KEYS.forEach(k=>rowsFor(k).forEach(r=>{const p=r.ph||'UNATTRIBUTED';if(acctMatch(r)&&p!=='UNATTRIBUTED')s.add(p);}));
    return s.size;}
  /* complete PH roster — every holder seen in any analysis (l1..l5), flagged or not */
  function phRoster(){
    const s=new Set();['l1','l2','l3','l4','l5'].forEach(k=>rowsFor(k).forEach(r=>s.add(r.ph||'UNATTRIBUTED')));return [...s];}
  function flaggedForAccount(acct){
    let n=0;
    FLAG_KEYS.forEach(k=>rowsFor(k).forEach(r=>{if(acct==='__ALL__'||r.account===acct)n++;}));
    return n;}
  function allAccounts(){
    if(hasAcctSummary())return D.account_summary.map(a=>a.account);
    const s=new Set();FLAG_KEYS.forEach(k=>rowsFor(k).forEach(r=>r.account&&s.add(r.account)));return [...s];}
  function totalFlagged(){return ANALYSES.filter(a=>a.key!=='l5').reduce((t,a)=>t+Number(countFor(a.key)||0),0);}

  /* ---- header + stats ---- */
  function renderHeader(){
    const s=D.summary||{};
    $('h-title').textContent=s.report_title||'PH Weekly Leakage Action Lists';
    $('h-sub').textContent=[(s.scope||'UK Amazon FBM'),(s.accounts||'LEDSone + DCVoltage'),(ANALYSES.length+' Analyses')].join('  ·  ');
  }
  function weekStart(endStr,days){
    const d=new Date(endStr);if(isNaN(d))return '';
    d.setDate(d.getDate()-((days||7)-1));   // inclusive N-day window ending on endStr
    return d.toISOString().slice(0,10);
  }
  function renderStats(){
    const s=D.summary||{};
    const endDate=s.report_date||s.generated_at||'';
    const startDate=weekStart(endDate,7);   // weekly (Monday) run = 7-day window
    const stats=[
      ['Start Date', startDate||'—','v'],
      ['End Date', endDate||'—','v'],
      ['Analysis Period', '7d / 30d / 3mo','v sm'],
      ['Total Flagged', totalFlagged().toLocaleString(),'v'],
      ['Affected PHs', affectedPhCount(),'v'],
      ['Accounts', allAccounts().length,'v']
    ];
    $('stats').innerHTML=stats.map(x=>'<div class="stat"><div class="k">'+esc(x[0])+'</div><div class="'+x[2]+'">'+esc(x[1])+'</div></div>').join('');
  }

  /* ---- KPI cards (clickable = analysis selector) ---- */
  function renderKPIs(){
    $('kpis').innerHTML='';
    ANALYSES.forEach(a=>{
      const el=document.createElement('div');
      const isActive=a.key===activeKey;
      el.className='kpi'+(isActive?' active':'');
      el.style.setProperty('--accent',a.accent);
      el.setAttribute('role','button');el.setAttribute('tabindex','0');
      el.setAttribute('aria-pressed',isActive?'true':'false');
      el.title='Click to view '+a.tab+' details';
      const cta=isActive
        ? '<div class="kpi-cta"><span class="kpi-view on">✓ Showing details</span></div>'
        : '<div class="kpi-cta"><span class="kpi-view">View details</span><span class="kpi-arrow">→</span></div>';
      const lvlFull={crit:'CRITICAL',high:'HIGH',med:'MEDIUM',low:'LOW'}[a.lvl]||txt(a.lvl).toUpperCase();
      /* Margin Trend (l5) is a per-PH count, not a flagged-item total — hide its count */
      const countHtml=(a.key==='l5')?'':'<span class="count">'+countFor(a.key)+'</span>';
      el.innerHTML='<div class="kpi-head"><span class="name">'+esc(a.tab)+'</span>'+countHtml+'</div>'+
        '<div class="kpi-sub"><span class="lvl '+a.lvl+'">'+esc(lvlFull)+'</span><span class="desc">'+esc(a.desc)+'</span></div>'+cta;
      el.onclick=()=>{activeKey=a.key;render();};
      el.onkeydown=(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();activeKey=a.key;render();}};
      $('kpis').appendChild(el);
    });
  }

  /* ---- tab bar (explicit selector — stays in sync with the KPI cards) ---- */
  function renderTabs(){
    const tb=$('tabbar');if(!tb)return;
    tb.innerHTML='';
    ANALYSES.forEach(a=>{
      const isActive=a.key===activeKey;
      const el=document.createElement('button');
      el.type='button';el.className='tab'+(isActive?' active':'');
      el.style.setProperty('--accent',a.accent);
      el.setAttribute('role','tab');el.setAttribute('aria-selected',isActive?'true':'false');
      el.title='Show '+a.tab;
      el.innerHTML='<span class="tab-nm">'+esc(a.tab)+'</span>'+(a.key==='l5'?'':'<span class="tab-ct">'+countFor(a.key)+'</span>');
      el.onclick=()=>{activeKey=a.key;render();};
      el.onkeydown=(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();activeKey=a.key;render();}};
      tb.appendChild(el);
    });
  }

  /* ---- account rail (top-left selector; filters every count) ---- */
  function renderAccountRail(){
    const opts=[{k:'__ALL__',label:'All accounts'}].concat(allAccounts().map(a=>({k:a,label:a})));
    const rail=$('acct-rail');
    rail.innerHTML=opts.map(o=>{
      const ct=flaggedForAccount(o.k);
      const cc=o.k==='__ALL__'?'oth':acctClass(o.k);
      return '<button class="acct-opt'+(acctFilter===o.k?' on':'')+'" type="button" data-a="'+esc(o.k)+'">'+
        '<span class="ao-name">'+esc(o.label)+'</span><span class="ao-ct '+cc+'">'+ct+'</span></button>';
    }).join('');
    rail.querySelectorAll('.acct-opt').forEach(b=>b.onclick=()=>{acctFilter=b.getAttribute('data-a');phFilter='__ALL__';render();});
  }

  /* ---- Portfolio Holder rail (full roster; 0 when no flagged records) ---- */
  function renderPhRail(){
    const rail=$('ph-rail');
    const cm={};phTotals().forEach(r=>{cm[r.ph]=r.count;});            // account-aware flag counts
    const allRows=phRoster().map(p=>({ph:p,count:cm[p]||0}))          // every holder, default 0
      .sort((a,b)=>b.count-a.count||a.ph.localeCompare(b.ph));        // flagged first, then A→Z
    const total=allRows.reduce((t,r)=>t+r.count,0);                  // All total still reflects every holder
    const rows=allRows.filter(r=>r.ph!=='UNATTRIBUTED');             // exclude UNATTRIBUTED from the PH list
    /* "All Portfolio Holders" is only meaningful when more than one PH exists; on a
       single-PH dashboard it is redundant (All == that PH), so it is omitted and the lone
       PH renders as the selected row. Master (many PHs) is unaffected. */
    let h='';
    if(rows.length>1){
      h+='<button class="ph-opt'+(phFilter==='__ALL__'?' on':'')+'" type="button" data-ph="__ALL__">'+
        '<span class="po-name">All Portfolio Holders</span><span class="po-ct">'+total+'</span></button>';
    }
    if(!rows.length){h+='<div class="empty" style="padding:14px;">No PH data.</div>';}
    h+=rows.map(r=>{
      const active=(phFilter===r.ph)||(rows.length===1&&phFilter==='__ALL__');
      return '<button class="ph-opt'+(active?' on':'')+(r.count===0?' empty-ph':'')+'" type="button" data-ph="'+esc(r.ph)+'">'+
        '<span class="po-name">'+esc(r.ph)+'</span><span class="po-ct'+(r.count===0?' zero':'')+'">'+r.count+'</span></button>';
    }).join('');
    rail.innerHTML=h;
    rail.querySelectorAll('.ph-opt').forEach(b=>b.onclick=()=>{
      const p=b.getAttribute('data-ph');phFilter=(p==='__ALL__'||phFilter===p)?'__ALL__':p;render();});
  }

  /* ---- verification → status cards ---- */
  function renderVerification(){
    const rows=Array.isArray(D.verification_summary)?D.verification_summary:[];
    if(!rows.length){$('verify').innerHTML='';return;}
    $('verify').innerHTML=rows.map(r=>{
      const val=txt(r.value);const warn=/gap|limit|null|degrad|40\.|excluded|spine/i.test(r.metric+' '+val) && !/coverage|99\.|generated|tables/i.test(r.metric);
      const cls=warn?'warn':'ok';const ic=warn?'⚠':'✓';
      return '<div class="vcard '+cls+'"><span class="ic">'+ic+'</span><span><span class="vt">'+esc(r.metric)+'</span><span class="vd">'+esc(val)+'</span></span></div>';
    }).join('');
  }

  /* ---- detail toolbar + chips ---- */
  function renderToolbar(){
    const sb=$('search');if(sb.value!==searchText)sb.value=searchText;
    sb.oninput=()=>{searchText=sb.value;renderDetailBody();};
    $('clear-btn').onclick=()=>{phFilter='__ALL__';acctFilter='__ALL__';searchText='';$('search').value='';render();};
  }

  /* ---- detail filtering (PH + account + search — same semantics) ---- */
  function filteredRows(key){
    const q=searchText.trim().toLowerCase();
    return rowsFor(key).filter(r=>{
      if(phFilter!=='__ALL__'&&(r.ph||'UNATTRIBUTED')!==phFilter)return false;
      if(acctFilter!=='__ALL__'&&r.account!==acctFilter)return false;
      if(q){const hay=((r.ph||'')+' '+(r.asin||'')+' '+(r.sku||'')+' '+(r.account||'')).toLowerCase();if(hay.indexOf(q)<0)return false;}
      return true;
    });
  }
  function groupByPh(rows){const g={};rows.forEach(r=>{const p=r.ph||'UNATTRIBUTED';(g[p]=g[p]||[]).push(r);});return g;}

  function metricRows(k,r){
    if(k==='l1')return [['Spend',money(r.spend)],['Conversions',num(r.conversions)],['Clicks',num(r.clicks)],['Impressions',num(r.impressions)]];
    if(k==='l2')return [['Revenue',money(r.revenue)],['Shipping',money(r.shipping)],['Shipping %',txt(r.shipping_pct)+'%'],['Orders',num(r.orders)]];
    if(k==='l3')return [['Revenue',money(r.revenue)],['Shipping',money(r.shipping)],['PPC',money(r.ppc)],['Net',money(r.net),Number(r.net)<0]];
    if(k==='l4')return [['Total Orders',num(r.total_orders)],['Refunded',num(r.refunded_orders)],['Refund Rate',txt(r.refund_rate)+'%'],['Revenue at Risk',money(r.revenue_at_risk)]];
    return [];
  }
  function eqLine(k,r){
    if(k==='l1')return 'CTR '+pct(r.clicks,r.impressions)+'  ·  CVR '+pct(r.conversions,r.clicks);
    if(k==='l2')return money(r.shipping)+' ÷ '+money(r.revenue)+' = '+txt(r.shipping_pct)+'%';
    if(k==='l3')return '('+money(r.revenue)+'×0.45) − '+money(r.shipping)+' − '+money(r.ppc)+' = '+money(r.net);
    if(k==='l4')return num(r.refunded_orders)+' ÷ '+num(r.total_orders)+' = '+txt(r.refund_rate)+'%';
    return '';
  }

  function card(a,r,idx){
    const key=rowKey(a.key,r);const done=!!TICKS[key];const rk=rowRisk(a.key,r);
    const el=document.createElement('div');el.className='lcard'+(done?' done':'');el.style.setProperty('--accent',a.accent);
    const mets=metricRows(a.key,r).map(m=>'<div class="metric"><span class="ml">'+esc(m[0])+'</span><span class="mv'+(m[2]?' neg':'')+'">'+esc(m[1])+'</span></div>').join('');
    el.innerHTML=
      '<div class="top"><span class="asin">'+esc(r.asin||'—')+'</span><span class="acct '+acctClass(r.account)+'">'+esc(r.account||'')+'</span></div>'+
      '<div class="sku">SKU: '+esc(r.sku||'—')+'</div>'+
      '<div class="ph"><b>PH:</b> '+esc(r.ph||'UNATTRIBUTED')+'</div>'+
      '<div class="cbadges">'+
        '<span class="badge '+rk+'">'+rk+' risk</span>'+
        '<span class="cpill cat">'+esc(a.tab)+'</span>'+
        '<span class="cpill st-pill '+(done?'st-done':'st-open')+'">'+(done?'✓ Done':'● Open')+'</span>'+
      '</div>'+
      '<div class="metrics">'+mets+'</div>'+
      '<div class="eq">'+esc(eqLine(a.key,r))+'</div>'+
      '<div class="foot"><span class="act">▸ '+esc(r.action||a.action||'')+'</span>'+
        '<label class="tickwrap"><input type="checkbox" '+(done?'checked':'')+'/> Done</label></div>';
    el.querySelector('input').onchange=function(){if(this.checked)TICKS[key]=1;else delete TICKS[key];saveTicks();
      el.classList.toggle('done',this.checked);
      const stp=el.querySelector('.st-pill');
      if(stp){stp.className='cpill st-pill '+(this.checked?'st-done':'st-open');stp.textContent=this.checked?'✓ Done':'● Open';}
      refreshProgress();};
    return el;
  }

  function renderDetailHead(){
    const a=ANALYSES.find(x=>x.key===activeKey);
    const lvlText={crit:'CRITICAL',high:'HIGH',med:'MEDIUM',low:'LOW'}[a.lvl]||txt(a.lvl).toUpperCase();
    $('d-title').innerHTML='<div class="dh-title-row">'+
      '<span class="dh-name">'+esc(a.full||a.tab)+'</span>'+
      '<span class="badge '+a.lvl+'">'+esc(lvlText)+'</span>'+
      '<span class="dh-window">'+esc(a.window)+'</span></div>';
    $('d-thresh').className='dh-concept';
    $('d-thresh').innerHTML=esc(a.concept||a.desc);
    $('d-flag').className='dhead-flag';
    $('d-flag').innerHTML='<span class="df-k">Flag</span><code class="df-v">'+esc(a.flag)+'</code>';
  }

  function renderDetailBody(){
    const a=ANALYSES.find(x=>x.key===activeKey);const body=$('d-body');body.innerHTML='';
    if(a.group==='ph-trend'||a.key==='l5'){renderL5(body,a);setFoot(a);return;}
    const rows=filteredRows(activeKey);
    if(!rows.length){body.innerHTML='<div class="empty">No items match the current filters.</div>';refreshProgress();setFoot(a);return;}
    const groups=groupByPh(rows);
    Object.keys(groups).sort().forEach(ph=>{
      const list=groups[ph];
      const block=document.createElement('div');block.className='ph-block';
      const ban=document.createElement('div');ban.className='ph-banner';
      ban.innerHTML='<span class="pn">'+esc(ph)+'</span><span class="pc">'+list.length+' flagged</span>';
      const grid=document.createElement('div');grid.className='grid-cards';grid.style.padding='8px 0 4px';
      ban.onclick=()=>{grid.style.display=grid.style.display==='none'?'grid':'none';};
      list.forEach((r,i)=>grid.appendChild(card(a,r,i+1)));
      block.appendChild(ban);block.appendChild(grid);body.appendChild(block);
    });
    refreshProgress();setFoot(a);
  }

  function renderL5(body,a){
    const acct=l5Acct();
    const rows=rowsFor('l5').filter(r=>{
      if((r.account||'ALL')!==acct)return false;
      if(phFilter!=='__ALL__'&&(r.ph||'UNATTRIBUTED')!==phFilter)return false;
      if(searchText.trim()){const q=searchText.toLowerCase();if((r.ph||'').toLowerCase().indexOf(q)<0)return false;}
      return true;});
    const byPh={};rows.forEach(r=>{(byPh[r.ph]=byPh[r.ph]||[]).push(r);});
    const phs=Object.keys(byPh).sort();
    if(!phs.length){body.innerHTML='<div class="empty">No PH trend data matches the filters.</div>';return;}
    const wrap=document.createElement('div');wrap.className='ph-block';wrap.style.paddingBottom='10px';
    phs.forEach(ph=>{
      const months=byPh[ph].slice().sort((x,y)=>txt(x.month).localeCompare(txt(y.month)));
      const flagged=months.some(m=>m.declining);
      const ban=document.createElement('div');ban.className='ph-banner';
      ban.innerHTML='<span class="pn">'+esc(ph)+'</span><span class="pc">'+(flagged?'<span class="badge crit">declining</span>':'<span class="badge low">stable</span>')+'</span>';
      const tbl=document.createElement('div');
      let t='<table class="mini"><tr><th>Month</th><th>Revenue</th><th>Shipping</th><th>PPC</th><th>Net</th><th>Margin %</th></tr>';
      months.forEach(m=>{t+='<tr class="'+(m.declining?'decline':'')+'"><td>'+esc(m.month)+'</td><td>'+money(m.revenue)+'</td><td>'+money(m.shipping)+'</td><td>'+money(m.ppc)+'</td><td>'+money(m.net)+'</td><td>'+txt(m.margin_pct)+'%</td></tr>';});
      t+='</table>';tbl.innerHTML=t;
      ban.onclick=()=>{tbl.style.display=tbl.style.display==='none'?'block':'none';};
      wrap.appendChild(ban);wrap.appendChild(tbl);
    });
    body.appendChild(wrap);
  }

  function setFoot(a){
    const s=D.summary||{};const disp=s.displayed&&s.displayed[a.key];const tot=countFor(a.key);
    let msg='';
    if(a.key!=='l5'&&disp!=null&&Number(disp)<Number(tot)) msg='Showing top '+disp+' of '+tot+' flagged '+a.tab+' items (by severity). Raise the data.js extract limit to embed all.';
    $('d-foot').textContent=msg;
  }

  function refreshProgress(){
    const a=ANALYSES.find(x=>x.key===activeKey);
    if(a.key==='l5'){$('prog-txt').textContent='trend view';$('bar-fill').style.width='0%';return;}
    const rows=filteredRows(activeKey);const done=rows.filter(r=>TICKS[rowKey(activeKey,r)]).length;
    $('prog-txt').textContent=done+' of '+rows.length+' done';
    $('bar-fill').style.width=(rows.length?Math.round(100*done/rows.length):0)+'%';
  }

  /* ---- export / print (presentation only — reads the same rows the view shows) ---- */
  function exportColumns(k){
    const base=[
      {h:'Portfolio Holder',g:r=>r.ph||'UNATTRIBUTED'},
      {h:'Account',g:r=>r.account||''},
      {h:'ASIN',g:r=>r.asin||''},
      {h:'SKU',g:r=>r.sku||''}
    ];
    if(k==='l1')return base.concat([
      {h:'Spend (£)',g:r=>r.spend},{h:'Conversions',g:r=>r.conversions},
      {h:'Clicks',g:r=>r.clicks},{h:'Impressions',g:r=>r.impressions},
      {h:'CTR',g:r=>pct(r.clicks,r.impressions)},{h:'CVR',g:r=>pct(r.conversions,r.clicks)},
      {h:'Action',g:r=>r.action||'PAUSE PPC'}]);
    if(k==='l2')return base.concat([
      {h:'Revenue (£)',g:r=>r.revenue},{h:'Shipping (£)',g:r=>r.shipping},
      {h:'Shipping %',g:r=>r.shipping_pct},{h:'Orders',g:r=>r.orders},
      {h:'Action',g:r=>r.action||'PRICE / CARRIER'}]);
    if(k==='l3')return base.concat([
      {h:'Revenue (£)',g:r=>r.revenue},{h:'Shipping (£)',g:r=>r.shipping},
      {h:'PPC (£)',g:r=>r.ppc},{h:'Net (£)',g:r=>r.net},
      {h:'Action',g:r=>r.action||'PAUSE PPC'}]);
    if(k==='l4')return base.concat([
      {h:'Total Orders',g:r=>r.total_orders},{h:'Refunded',g:r=>r.refunded_orders},
      {h:'Refund Rate %',g:r=>r.refund_rate},{h:'Revenue at Risk (£)',g:r=>r.revenue_at_risk},
      {h:'Action',g:r=>r.action||'INVESTIGATE'}]);
    return base;
  }
  function exportTable(){
    const a=ANALYSES.find(x=>x.key===activeKey);
    if(activeKey==='l5'){
      const q=searchText.trim().toLowerCase();
      const rows=rowsFor('l5').filter(r=>{
        if(phFilter!=='__ALL__'&&(r.ph||'UNATTRIBUTED')!==phFilter)return false;
        if(q&&(r.ph||'').toLowerCase().indexOf(q)<0)return false;
        return true;
      }).slice().sort((x,y)=>txt(x.ph).localeCompare(txt(y.ph))||txt(x.month).localeCompare(txt(y.month)));
      return {title:a.tab,
        headers:['Portfolio Holder','Month','Revenue (£)','Shipping (£)','PPC (£)','Net (£)','Margin %','Declining'],
        data:rows.map(r=>[r.ph||'UNATTRIBUTED',r.month,r.revenue,r.shipping,r.ppc,r.net,r.margin_pct,r.declining?'YES':''])};
    }
    const rows=filteredRows(activeKey);const cols=exportColumns(activeKey);
    return {title:a.tab,
      headers:cols.map(c=>c.h).concat('Done'),
      data:rows.map(r=>cols.map(c=>c.g(r)).concat(TICKS[rowKey(activeKey,r)]?'Yes':'No'))};
  }
  function exportFileBase(){
    const s=D.summary||{};const a=ANALYSES.find(x=>x.key===activeKey);
    const d=String(s.report_date||s.generated_at||'').replace(/[^0-9-]/g,'')||'export';
    return 'WLSP_'+a.tab.replace(/[^A-Za-z0-9]+/g,'_')+'_'+d;
  }
  function downloadFile(name,content,mime){
    try{
      const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);
      const link=document.createElement('a');link.href=url;link.download=name;
      document.body.appendChild(link);link.click();document.body.removeChild(link);
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    }catch(e){alert('Export failed: '+(e&&e.message?e.message:e));}
  }
  function exportCSV(){
    const t=exportTable();
    const cell=v=>{v=(v===null||v===undefined)?'':String(v);return /[",\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
    const lines=[t.headers.map(cell).join(',')].concat(t.data.map(row=>row.map(cell).join(',')));
    downloadFile(exportFileBase()+'.csv','﻿'+lines.join('\r\n'),'text/csv;charset=utf-8;');
  }
  function exportXLS(){
    const t=exportTable();const sheet=esc(t.title).slice(0,31);
    let h='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel">'+
      '<head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet>'+
      '<x:Name>'+sheet+'</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>'+
      '</x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>'+
      '<table border="1" cellspacing="0" cellpadding="4"><thead>'+
      '<tr style="background:#1f2838;color:#ffffff;font-weight:bold;">'+
      t.headers.map(x=>'<th>'+esc(x)+'</th>').join('')+'</tr></thead><tbody>';
    t.data.forEach(row=>{h+='<tr>'+row.map(c=>'<td>'+esc(c===null||c===undefined?'':String(c))+'</td>').join('')+'</tr>';});
    h+='</tbody></table></body></html>';
    downloadFile(exportFileBase()+'.xls',h,'application/vnd.ms-excel');
  }
  function initActions(){
    $('print-btn').onclick=()=>window.print();
    $('csv-btn').onclick=exportCSV;
    $('xls-btn').onclick=exportXLS;
  }

  /* ---- theme ---- */
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme',t);
    $('theme-ic').textContent=t==='dark'?'🌙':'☀';$('theme-lb').textContent=t==='dark'?'Dark':'Light';
    try{localStorage.setItem('wlsp_theme',t);}catch(e){}
  }
  function initTheme(){
    let t='light';try{t=localStorage.getItem('wlsp_theme')||'light';}catch(e){}
    applyTheme(t);
    $('theme-btn').onclick=()=>applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
  }

  /* ---- master render ---- */
  function render(){
    renderHeader();renderStats();renderKPIs();
    renderAccountRail();renderPhRail();
    renderToolbar();renderDetailHead();renderDetailBody();
  }
  document.addEventListener('DOMContentLoaded',function(){initTheme();initActions();render();});
})();
</script>
</body>
</html>
